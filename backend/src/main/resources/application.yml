server:
  port: 8081

spring:
  application:
    name: fixed-asset-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fixed_asset_lifecycle_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

asset:
  jwt:
    secret: fixed-asset-lifecycle-system-jwt-secret-key-2026-asset-platform
    expiration-minutes: 720

ai:
  enabled: ${AI_ENABLED:true}
  provider: deepseek
  api-base-url: ${DEEPSEEK_API_BASE_URL:https://api.deepseek.com}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: 30
  fallback-enabled: true
